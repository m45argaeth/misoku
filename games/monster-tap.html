<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monster Tap RPG</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
:root{--g-accent:#ff4d5e}
.mt-wrap{max-width:880px;margin:0 auto;padding:74px 16px 40px;display:grid;grid-template-columns:1.2fr 1fr;gap:20px}
@media(max-width:760px){.mt-wrap{grid-template-columns:1fr}}
.arena{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);padding:22px;text-align:center;position:relative;overflow:hidden;min-height:420px;display:flex;flex-direction:column}
.arena::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 20%,rgba(255,77,94,.16),transparent 60%);pointer-events:none}
.stagebar{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:var(--muted);position:relative;z-index:1}
.stagebar b{color:#fff}
.boss-flag{color:#ffd23f;font-weight:800}
.monster{font-size:7rem;cursor:pointer;user-select:none;margin:24px auto 6px;line-height:1;transition:transform .07s;position:relative;z-index:1;filter:drop-shadow(0 10px 20px rgba(0,0,0,.4))}
.monster:active{transform:scale(.9)}
.monster.hit{animation:shake .18s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px) rotate(-4deg)}75%{transform:translateX(8px) rotate(4deg)}}
.mname{position:relative;z-index:1;font-weight:800;font-size:1.1rem;margin-bottom:8px}
.hpbar{position:relative;z-index:1;height:22px;border-radius:999px;background:rgba(0,0,0,.35);overflow:hidden;border:1px solid var(--panel-border);max-width:420px;margin:0 auto;width:100%}
.hpfill{height:100%;background:linear-gradient(90deg,#ff4d5e,#ff8a5e);transition:width .12s;border-radius:999px}
.hptext{position:relative;z-index:1;font-size:.8rem;color:#fff;margin-top:6px}
.btimer{position:relative;z-index:1;margin-top:8px;font-size:.85rem;color:#ffd23f;font-weight:800;height:18px}
.dmgpop{position:fixed;pointer-events:none;font-weight:900;font-size:1.3rem;color:#ffd23f;text-shadow:0 2px 6px #000;z-index:200;animation:dpop .8s ease-out forwards}
@keyframes dpop{0%{opacity:1;transform:translateY(0) scale(.8)}100%{opacity:0;transform:translateY(-60px) scale(1.4)}}
.side{display:flex;flex-direction:column;gap:16px}
.statbox{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);padding:16px;display:flex;justify-content:space-around;text-align:center}
.statbox div b{display:block;font-size:1.3rem;color:#fff}
.statbox div span{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.shop{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);padding:16px}
.shop h3{font-size:.8rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px}
.item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:rgba(255,255,255,.03);border:1px solid var(--panel-border);border-radius:12px;padding:11px;margin-bottom:9px;cursor:pointer;transition:.15s;color:var(--text)}
.item:hover:not(:disabled){border-color:var(--g-accent);transform:translateX(2px)}
.item:disabled{opacity:.45;cursor:not-allowed}
.item .i-ico{font-size:1.5rem;width:40px;height:40px;display:grid;place-items:center;background:rgba(0,0,0,.25);border-radius:10px}
.item .i-body{flex:1}
.item .i-name{font-weight:700;font-size:.9rem;display:flex;justify-content:space-between}
.item .i-owned{color:var(--muted);font-size:.78rem}
.item .i-desc{font-size:.73rem;color:var(--muted)}
.item .i-cost{font-size:.8rem;font-weight:800;color:var(--g-accent);white-space:nowrap}
.item.afford .i-cost{color:#3fe08a}
</style>
</head>
<body>
<div class="game-top">
  <a class="back" href="../index.html">← Hub</a>
  <span class="gname">🐉 Monster Tap RPG</span>
  <button class="reset" id="resetBtn">Reset</button>
</div>
<div class="mt-wrap">
  <div class="arena">
    <div class="stagebar"><span>Stage <b id="stage">1</b></span><span id="bossFlag"></span><span>👹 <b id="kills">0</b>/10</span></div>
    <div class="monster" id="monster">👾</div>
    <div class="mname" id="mname">Slime</div>
    <div class="hpbar"><div class="hpfill" id="hpfill" style="width:100%"></div></div>
    <div class="hptext" id="hptext">10 / 10</div>
    <div class="btimer" id="btimer"></div>
  </div>
  <div class="side">
    <div class="statbox">
      <div><b id="gold">0</b><span>💰 Emas</span></div>
      <div><b id="dmg">1</b><span>⚔️ Klik DMG</span></div>
      <div><b id="dps">0</b><span>🔥 DPS</span></div>
    </div>
    <div class="shop"><h3>⚔️ Upgrade Damage</h3><div id="ups"></div></div>
    <div class="shop"><h3>🧙 Rekrut Hero (Auto-DPS)</h3><div id="heroes"></div></div>
  </div>
</div>
<script>
const KEY='mm_monster-tap';
const MONSTERS=['👾','👻','🧟','🧛','👹','🦇','🐍','🦂','🦑','🐲'];
const NAMES=['Slime','Hantu','Zombie','Vampir','Iblis','Kelelawar','Ular Raksasa','Kalajengking','Cumi Abyssal','Naga Muda'];
const BOSSES=['👺','🤖','👽','👀','🎃','🔥','☠️','👑','👿','🐉'];
const upDefs=[
  {id:'sword',name:'Pedang Tajam',icon:'🗡️',desc:'+1 klik DMG',baseCost:10,mul:1.12,add:1},
  {id:'axe',name:'Kapak Berat',icon:'🪓',desc:'+5 klik DMG',baseCost:120,mul:1.13,add:5},
  {id:'crit',name:'Sarung Kritikal',icon:'🧤',desc:'+25 klik DMG',baseCost:1400,mul:1.14,add:25},
  {id:'rune',name:'Rune Kuno',icon:'📜',desc:'Klik DMG x2',baseCost:9000,mul:1.7,multiply:2}
];
const heroDefs=[
  {id:'archer',name:'Pemanah',icon:'🏹',desc:'+2 DPS',baseCost:50,mul:1.15,dps:2},
  {id:'knight',name:'Ksatria',icon:'🛡️',desc:'+10 DPS',baseCost:500,mul:1.16,dps:10},
  {id:'mage',name:'Penyihir',icon:'🧙',desc:'+55 DPS',baseCost:5000,mul:1.18,dps:55},
  {id:'dragon',name:'Naga Sekutu',icon:'🐲',desc:'+300 DPS',baseCost:45000,mul:1.2,dps:300}
];
let st={gold:0,stage:1,kills:0,owned:{}};
const sv=localStorage.getItem(KEY);if(sv){try{st=Object.assign(st,JSON.parse(sv));}catch(e){}}
[...upDefs,...heroDefs].forEach(d=>{if(st.owned[d.id]==null)st.owned[d.id]=0;});
let mon={};
function fmt(n){n=Math.floor(n);if(n<1000)return''+n;const u=['','K','M','B','T','Qa','Qi'];let i=0;while(n>=1000&&i<u.length-1){n/=1000;i++;}return(n<10?n.toFixed(2):n<100?n.toFixed(1):Math.floor(n))+u[i];}
function clickDmg(){let p=1,m=1;upDefs.forEach(d=>{if(d.add)p+=d.add*st.owned[d.id];if(d.multiply)m*=Math.pow(d.multiply,st.owned[d.id]);});return p*m;}
function dps(){let c=0;heroDefs.forEach(d=>c+=d.dps*st.owned[d.id]);return c;}
function isBoss(){return st.stage%10===0;}
function monsterMaxHp(){const base=10*Math.pow(1.55,st.stage-1);return Math.ceil(isBoss()?base*8:base);}
function monsterReward(){return Math.ceil((isBoss()?monsterMaxHp()*0.5:monsterMaxHp()*0.25)+st.stage*2);}
let bossTimer=0,bossInt=null;
function spawn(){
  const idx=(st.stage-1)%10;
  mon={hp:monsterMaxHp(),max:monsterMaxHp()};
  document.getElementById('monster').textContent=isBoss()?BOSSES[idx]:MONSTERS[idx];
  document.getElementById('mname').textContent=isBoss()?('BOSS: '+NAMES[idx]):NAMES[(st.stage-1)%NAMES.length];
  document.getElementById('bossFlag').innerHTML=isBoss()?'<span class="boss-flag">⚠️ BOSS FIGHT</span>':'';
  clearInterval(bossInt);
  if(isBoss()){bossTimer=30;tickBoss();bossInt=setInterval(tickBoss,1000);}else{document.getElementById('btimer').textContent='';}
  renderMon();
}
function tickBoss(){document.getElementById('btimer').textContent='⏱️ '+bossTimer+'s';if(bossTimer<=0){clearInterval(bossInt);st.kills=0;st.stage=Math.max(1,st.stage-1);__toast('💀 Boss kabur! Turun ke stage '+st.stage);spawn();return;}bossTimer--;}
function renderMon(){const pct=Math.max(0,mon.hp/mon.max*100);document.getElementById('hpfill').style.width=pct+'%';document.getElementById('hptext').textContent=fmt(Math.max(0,mon.hp))+' / '+fmt(mon.max);}
function kill(){st.gold+=monsterReward();st.kills++;if(st.kills>=10){st.kills=0;st.stage++;__toast('⬆️ Stage '+st.stage+'!');}spawn();renderAll();save();}
function hurt(dmg,x,y){if(mon.hp<=0)return;mon.hp-=dmg;if(x!=null){const p=document.createElement('div');p.className='dmgpop';p.textContent='-'+fmt(dmg);p.style.left=x+'px';p.style.top=y+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),800);}if(mon.hp<=0){kill();}else renderMon();}
const monEl=document.getElementById('monster');
monEl.addEventListener('click',e=>{monEl.classList.remove('hit');void monEl.offsetWidth;monEl.classList.add('hit');hurt(clickDmg(),e.clientX,e.clientY-10);});
function buildShop(){
  const ub=document.getElementById('ups'),hb=document.getElementById('heroes');
  function mk(d,box){const b=document.createElement('button');b.className='item';b.id='it-'+d.id;b.innerHTML=`<div class="i-ico">${d.icon}</div><div class="i-body"><div class="i-name"><span>${d.name}</span><span class="i-owned" id="own-${d.id}"></span></div><div class="i-desc">${d.desc}</div></div><div class="i-cost" id="cost-${d.id}"></div>`;b.onclick=()=>buy(d);box.appendChild(b);}
  upDefs.forEach(d=>mk(d,ub));heroDefs.forEach(d=>mk(d,hb));
}
function cost(d){return Math.ceil(d.baseCost*Math.pow(d.mul,st.owned[d.id]));}
function buy(d){const c=cost(d);if(st.gold<c)return;st.gold-=c;st.owned[d.id]++;renderAll();save();}
function renderAll(){
  document.getElementById('gold').textContent=fmt(st.gold);
  document.getElementById('dmg').textContent=fmt(clickDmg());
  document.getElementById('dps').textContent=fmt(dps());
  document.getElementById('stage').textContent=st.stage;
  document.getElementById('kills').textContent=st.kills;
  [...upDefs,...heroDefs].forEach(d=>{const c=cost(d),b=document.getElementById('it-'+d.id);b.disabled=st.gold<c;b.classList.toggle('afford',st.gold>=c);document.getElementById('cost-'+d.id).textContent='💰 '+fmt(c);document.getElementById('own-'+d.id).textContent=st.owned[d.id]>0?('x'+st.owned[d.id]):'';});
}
let toastT;function __toast(m){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#1b1b33;border:1px solid rgba(255,255,255,.1);padding:12px 18px;border-radius:12px;color:#fff;font-size:.88rem;z-index:300;transition:.3s';document.body.appendChild(t);}t.textContent=m;t.style.opacity='1';clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity='0',2600);}
function save(){localStorage.setItem(KEY,JSON.stringify(st));}
setInterval(()=>{const d=dps();if(d>0&&mon.hp>0)hurt(d/10);},100);
setInterval(save,5000);window.addEventListener('beforeunload',save);
document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset progress Monster Tap RPG?')){localStorage.removeItem(KEY);location.reload();}};
buildShop();spawn();renderAll();
</script>
</body>
</html>
