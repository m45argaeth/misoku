<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ninja Leap</title>
<link rel="stylesheet" href="../assets/style.css">
<link rel="stylesheet" href="../assets/canvas.css">
<style>.touch-ctrl{position:fixed;bottom:14px;left:0;right:0;display:flex;justify-content:space-between;padding:0 16px;z-index:60;pointer-events:none}
.touch-ctrl .grp{display:flex;gap:10px;pointer-events:auto}
.tbtn{width:60px;height:60px;border-radius:16px;border:1px solid var(--panel-border);background:rgba(255,255,255,.06);color:#fff;font-size:1.3rem;font-weight:800;display:grid;place-items:center;user-select:none}
@media(hover:hover){.touch-ctrl{display:none}}</style>
</head>
<body class="canvas-game">
<div class="game-top">
  <a class="back" href="../index.html">← Hub</a>
  <span class="gname">🥷 Ninja Leap</span>
  <button class="reset" id="resetBtn">Ulang</button>
</div>
<div class="hud">
  <div class="h"><span>Koin</span><b id="coins">0</b></div>
  <div class="h"><span>Ketinggian</span><b id="height">0</b></div>
  <div class="h"><span>Terbaik</span><b id="best">0</b></div>
</div>
<div class="stage"><canvas id="c" width="440" height="560"></canvas></div>
<div class="touch-ctrl">
  <div class="grp"><div class="tbtn" id="bl">←</div><div class="tbtn" id="br">→</div></div>
  <div class="grp"><div class="tbtn" id="bd">»</div><div class="tbtn" id="bj">⬆</div></div>
</div>
<div class="overlay" id="ov">
  <div class="panel">
    <div class="big">🥷</div>
    <h2>Ninja Leap</h2>
    <p>Panjat ke atas lewat dinding sempit dengan wall-jump &amp; dash. Hindari duri, kumpulkan koin.</p>
    <button class="btn" id="startBtn">Mulai Memanjat</button>
    <div class="keyhint"><kbd>←</kbd><kbd>→</kbd> gerak · <kbd>Spasi</kbd> lompat/wall-jump · <kbd>Shift</kbd> dash</div>
  </div>
</div>
<script>
const KEY='mm_ninja-leap-best';
const c=document.getElementById('c'),x=c.getContext('2d');
const W=c.width,H=c.height,WALL=46;
let best=+(localStorage.getItem(KEY)||0);document.getElementById('best').textContent=best;
let running=false,p,keys,plats,spikes,coins,camY,height,coinCount,jumpHeld,dashCd,maxUp;
const GRAV=0.6;
function seg(yTop,yBot){return{x:WALL,y:yTop,w:W-WALL*2,h:yBot-yTop};}
function genChunk(startY){
  // create platforms/spikes/coins going up from startY
  for(let y=startY;y>startY-1200;y-=Math.random()*70+70){
    const onLeft=Math.random()<.5;const w=70+Math.random()*40;
    const px=onLeft?WALL:W-WALL-w;
    if(Math.random()<.8)plats.push({x:px,y:y,w:w,h:14});
    if(Math.random()<.4)coins.push({x:px+w/2,y:y-26,got:false});
    if(Math.random()<.28){const sx=onLeft?W-WALL-46:WALL;spikes.push({x:sx,y:y+6,w:46,h:12,dir:onLeft?1:-1});}
  }
}
function reset(){p={x:W/2-15,y:H-90,w:30,h:34,vx:0,vy:0,onGround:false,wall:0,dashT:0};keys={l:false,r:false};plats=[{x:WALL,y:H-60,w:W-WALL*2,h:16}];spikes=[];coins=[];camY=0;height=0;coinCount=0;dashCd=0;maxUp=0;jumpHeld=false;genChunk(H-120);}
function end(reason){running=false;if(height>best){best=height;localStorage.setItem(KEY,best);}document.getElementById('best').textContent=best;const ov=document.getElementById('ov');ov.querySelector('.panel').innerHTML=`<div class="big">${reason==='spike'?'💥':'🕳️'}</div><h2>${reason==='spike'?'Kena Duri!':'Terjatuh!'}</h2><div class="score-line">Tinggi: <b>${height} m</b> · 🪙 ${coinCount}</div><p>Terbaik: ${best} m</p><button class="btn" id="startBtn">Coba Lagi</button>`;ov.classList.remove('hide');bind();}
function doJump(){if(p.onGround){p.vy=-13;p.onGround=false;}else if(p.wall!==0){p.vy=-12.5;p.vx=p.wall*7;p.wall=0;}}
function doDash(){if(dashCd<=0){const dir=keys.l?-1:keys.r?1:(p.x<W/2?1:-1);p.vx=dir*13;p.dashT=8;dashCd=45;}}
function loop(){
  if(!running)return;
  if(p.dashT>0){p.dashT--;}else{if(keys.l)p.vx=-4.6;else if(keys.r)p.vx=4.6;else p.vx*=0.8;}
  dashCd--;
  p.vy+=GRAV;if(p.vy>15)p.vy=15;
  p.x+=p.vx;
  // walls
  p.wall=0;
  if(p.x<WALL){p.x=WALL;if(p.vy>1){p.vy=Math.min(p.vy,2.4);p.wall=1;}}
  if(p.x+p.w>W-WALL){p.x=W-WALL-p.w;if(p.vy>1){p.vy=Math.min(p.vy,2.4);p.wall=-1;}}
  p.y+=p.vy;p.onGround=false;
  plats.forEach(pl=>{if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+Math.abs(p.vy)+2&&p.vy>=0){p.y=pl.y-p.h;p.vy=0;p.onGround=true;}});
  // camera
  if(p.y-camY<H*0.45)camY=p.y-H*0.45;
  maxUp=Math.min(maxUp,p.y);height=Math.max(height,Math.floor((H-120-maxUp)/10));
  document.getElementById('height').textContent=height;
  // generate more
  let top=Math.min(...plats.map(pl=>pl.y));if(top>camY-200)genChunk(top);
  // cleanup below
  plats=plats.filter(pl=>pl.y-camY<H+80);spikes=spikes.filter(s=>s.y-camY<H+80);
  // spikes collision
  for(const s of spikes){if(p.x+p.w>s.x&&p.x<s.x+s.w&&p.y+p.h>s.y&&p.y<s.y+s.h){end('spike');return;}}
  // coins
  coins.forEach(co=>{if(!co.got&&Math.abs(p.x+p.w/2-co.x)<22&&Math.abs(p.y+p.h/2-co.y)<22){co.got=true;coinCount++;document.getElementById('coins').textContent=coinCount;}});
  // fall death
  if(p.y-camY>H+60){end('fall');return;}
  draw();
  requestAnimationFrame(loop);
}
function draw(){
  x.clearRect(0,0,W,H);const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0e0e22');g.addColorStop(1,'#161228');x.fillStyle=g;x.fillRect(0,0,W,H);
  // side walls
  x.fillStyle='#1d1d3a';x.fillRect(0,0,WALL,H);x.fillRect(W-WALL,0,WALL,H);
  x.fillStyle='rgba(255,255,255,.04)';for(let y=(-camY%40);y<H;y+=40){x.fillRect(0,y,WALL,2);x.fillRect(W-WALL,y,WALL,2);}
  // platforms
  plats.forEach(pl=>{const sy=pl.y-camY;if(sy<-20||sy>H+20)return;x.fillStyle='#7c5cff';rr(pl.x,sy,pl.w,pl.h,5);x.fill();});
  // spikes
  x.fillStyle='#ff4d5e';spikes.forEach(s=>{const sy=s.y-camY;if(sy<-20||sy>H+20)return;const n=Math.floor(s.w/11);for(let i=0;i<n;i++){x.beginPath();x.moveTo(s.x+i*11,sy+s.h);x.lineTo(s.x+i*11+5.5,sy);x.lineTo(s.x+i*11+11,sy+s.h);x.fill();}});
  // coins
  coins.forEach(co=>{if(co.got)return;const sy=co.y-camY;if(sy<-20||sy>H+20)return;x.fillStyle='#ffd23f';x.beginPath();x.arc(co.x,sy,9,0,7);x.fill();x.fillStyle='#0e0e22';x.font='11px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText('¢',co.x,sy+1);});
  // player
  const py=p.y-camY;x.fillStyle=p.dashT>0?'#00e5ff':'#fff';rr(p.x,py,p.w,p.h,7);x.fill();
  x.fillStyle='#0e0e22';x.fillRect(p.x+6,py+11,p.w-12,5);// ninja mask band
  x.fillStyle='#fff';x.fillRect(p.x+9,py+11,4,5);x.fillRect(p.x+p.w-13,py+11,4,5);
  // dash cd bar
  if(dashCd>0){x.fillStyle='rgba(0,229,255,.5)';x.fillRect(p.x,py-7,p.w*(1-dashCd/45),3);}
}
function rr(rx,ry,rw,rh,r){x.beginPath();x.moveTo(rx+r,ry);x.arcTo(rx+rw,ry,rx+rw,ry+rh,r);x.arcTo(rx+rw,ry+rh,rx,ry+rh,r);x.arcTo(rx,ry+rh,rx,ry,r);x.arcTo(rx,ry,rx+rw,ry,r);x.closePath();}
function start(){document.getElementById('ov').classList.add('hide');reset();running=true;loop();}
function bind(){document.getElementById('startBtn').onclick=start;}
bind();
window.addEventListener('keydown',e=>{if(['ArrowLeft','KeyA'].includes(e.code))keys.l=true;if(['ArrowRight','KeyD'].includes(e.code))keys.r=true;if(e.code==='Space'){e.preventDefault();if(!jumpHeld){doJump();jumpHeld=true;}}if(e.code==='ShiftLeft'||e.code==='ShiftRight')doDash();});
window.addEventListener('keyup',e=>{if(['ArrowLeft','KeyA'].includes(e.code))keys.l=false;if(['ArrowRight','KeyD'].includes(e.code))keys.r=false;if(e.code==='Space')jumpHeld=false;});
function hold(id,fn,k){const el=document.getElementById(id);el.addEventListener('pointerdown',e=>{e.preventDefault();if(k){keys[k]=true;}else fn();});if(k){el.addEventListener('pointerup',()=>keys[k]=false);el.addEventListener('pointerleave',()=>keys[k]=false);}}
hold('bl',null,'l');hold('br',null,'r');hold('bj',doJump);hold('bd',doDash);
document.getElementById('resetBtn').onclick=()=>{if(running)end('fall');};
</script>
</body>
</html>
