<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pixel Dash</title>
<link rel="stylesheet" href="../assets/style.css">
<link rel="stylesheet" href="../assets/canvas.css">
</head>
<body class="canvas-game">
<div class="game-top">
  <a class="back" href="../index.html">← Hub</a>
  <span class="gname">🏃 Pixel Dash</span>
  <button class="reset" id="resetBtn">Reset Skor</button>
</div>
<div class="hud">
  <div class="h"><span>Skor</span><b id="score">0</b></div>
  <div class="h"><span>Terbaik</span><b id="best">0</b></div>
</div>
<div class="stage"><canvas id="c" width="800" height="450"></canvas></div>
<div class="overlay" id="ov">
  <div class="panel">
    <div class="big">🏃</div>
    <h2>Pixel Dash</h2>
    <p>Lari otomatis, lompat hindari rintangan. Makin jauh, makin cepat!</p>
    <button class="btn" id="startBtn">Mulai Lari</button>
    <div class="keyhint"><kbd>Spasi</kbd> / <kbd>↑</kbd> / Klik untuk lompat · bisa <b>double jump</b></div>
  </div>
</div>
<script>
const KEY='mm_pixel-dash-best';
const c=document.getElementById('c'),x=c.getContext('2d');
const W=c.width,H=c.height,GROUND=H-60;
let best=+(localStorage.getItem(KEY)||0);document.getElementById('best').textContent=best;
let running=false,player,obstacles,clouds,speed,score,spawnT,jumps,gravity,particles;
function reset(){
  player={x:110,y:GROUND-40,w:34,h:40,vy:0};
  obstacles=[];clouds=[];particles=[];speed=5.4;score=0;spawnT=60;jumps=0;gravity=0.62;
  for(let i=0;i<5;i++)clouds.push({x:Math.random()*W,y:30+Math.random()*150,s:.4+Math.random()*.6,r:18+Math.random()*22});
}
function jump(){if(!running)return;if(jumps<2){player.vy=jumps===0?-13:-11;jumps++;for(let i=0;i<6;i++)particles.push({x:player.x+player.w/2,y:player.y+player.h,vx:(Math.random()-.5)*4,vy:Math.random()*3,life:18});}}
function spawnObs(){const tall=Math.random()<0.3;const h=tall?54:34;obstacles.push({x:W+20,y:GROUND-h,w:22+Math.random()*16,h:h});}
function end(){running=false;if(score>best){best=Math.floor(score);localStorage.setItem(KEY,best);}document.getElementById('best').textContent=Math.floor(best);const ov=document.getElementById('ov');ov.querySelector('.panel').innerHTML=`<div class="big">💥</div><h2>Game Over</h2><div class="score-line">Skor: <b>${Math.floor(score)}</b></div><p>Terbaik: ${Math.floor(best)} m</p><button class="btn" id="startBtn">Lari Lagi</button><div class="keyhint"><kbd>Spasi</kbd> untuk lompat</div>`;ov.classList.remove('hide');bind();}
function loop(){
  if(!running)return;
  x.clearRect(0,0,W,H);
  // bg
  const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#161634');g.addColorStop(1,'#0c0c1c');x.fillStyle=g;x.fillRect(0,0,W,H);
  clouds.forEach(cl=>{cl.x-=speed*cl.s*.3;if(cl.x<-50)cl.x=W+40;x.fillStyle='rgba(255,255,255,.06)';x.beginPath();x.arc(cl.x,cl.y,cl.r,0,7);x.arc(cl.x+cl.r,cl.y+4,cl.r*.8,0,7);x.fill();});
  // ground
  x.fillStyle='#7c5cff';x.fillRect(0,GROUND,W,4);x.fillStyle='rgba(124,92,255,.12)';x.fillRect(0,GROUND+4,W,H-GROUND);
  // physics
  player.vy+=gravity;player.y+=player.vy;if(player.y>=GROUND-player.h){player.y=GROUND-player.h;player.vy=0;jumps=0;}
  // player
  x.save();x.translate(player.x+player.w/2,player.y+player.h/2);x.rotate(Math.min(.4,player.vy*0.03));x.fillStyle='#00e5ff';roundRect(-player.w/2,-player.h/2,player.w,player.h,7);x.fill();x.fillStyle='#0c0c1c';x.fillRect(player.w/2-13,-player.h/2+9,6,6);x.restore();
  // obstacles
  speed+=0.0018;spawnT--;if(spawnT<=0){spawnObs();spawnT=Math.max(38,90-speed*4)+Math.random()*30;}
  for(let i=obstacles.length-1;i>=0;i--){const o=obstacles[i];o.x-=speed;x.fillStyle='#ff4d8d';roundRect(o.x,o.y,o.w,o.h,5);x.fill();
    if(player.x<o.x+o.w&&player.x+player.w>o.x&&player.y<o.y+o.h&&player.y+player.h>o.y){end();return;}
    if(o.x+o.w<0)obstacles.splice(i,1);}
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x-=speed;p.x+=p.vx;p.y+=p.vy;p.life--;x.fillStyle='rgba(0,229,255,'+(p.life/18)+')';x.fillRect(p.x,p.y,4,4);if(p.life<=0)particles.splice(i,1);}
  score+=speed*0.05;document.getElementById('score').textContent=Math.floor(score);
  requestAnimationFrame(loop);
}
function roundRect(rx,ry,rw,rh,r){x.beginPath();x.moveTo(rx+r,ry);x.arcTo(rx+rw,ry,rx+rw,ry+rh,r);x.arcTo(rx+rw,ry+rh,rx,ry+rh,r);x.arcTo(rx,ry+rh,rx,ry,r);x.arcTo(rx,ry,rx+rw,ry,r);x.closePath();}
function start(){reset();running=true;document.getElementById('ov').classList.add('hide');loop();}
function bind(){document.getElementById('startBtn').onclick=start;}
bind();
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();if(!running&&document.getElementById('ov').classList.contains('hide')===false){start();}else jump();}});
c.addEventListener('pointerdown',jump);
document.getElementById('resetBtn').onclick=()=>{localStorage.removeItem(KEY);best=0;document.getElementById('best').textContent=0;};
</script>
</body>
</html>
